<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="192" height="96" rx="36" fill="url(#shine)"/>
  <!-- Mortarboard cap -->
  <polygon points="96,38 148,63 96,88 44,63" fill="#ffffff"/>
  <polygon points="96,88 148,63 148,75 96,100" fill="#bbdefb"/>
  <polygon points="96,88 44,63 44,75 96,100" fill="#e3f2fd"/>
  <!-- Tassel -->
  <rect x="145" y="63" width="5" height="24" rx="2" fill="#ffd54f"/>
  <circle cx="147" cy="90" r="5" fill="#ffd54f"/>
  <!-- App name -->
  <text x="96" y="128" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" text-anchor="middle" fill="#ffffff" letter-spacing="1">AMLAN</text>
  <!-- Divider -->
  <rect x="40" y="136" width="112" height="3" rx="1.5" fill="#42a5f5"/>
  <!-- Subtitle -->
  <text x="96" y="158" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#90caf9">COACHING</text>
  <text x="96" y="178" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle" fill="#bbdefb">Fees Manager</text>
</svg>
