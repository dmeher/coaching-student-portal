  <!-- App name -->
  <text x="90" y="121" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" text-anchor="middle" fill="#ffffff" letter-spacing="1">AMLAN</text>
  <rect x="38" y="128" width="104" height="3" rx="1.5" fill="#42a5f5"/>
  <text x="90" y="149" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="#90caf9">COACHING</text>
  <text x="90" y="168" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle" fill="#bbdefb">Fees Manager</text>
