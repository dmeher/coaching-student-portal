      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="34" fill="url(#bg)"/>
  <rect width="180" height="90" rx="34" fill="url(#shine)"/>
  <!-- Mortarboard cap -->
  <polygon points="90,35 139,59 90,83 41,59" fill="#ffffff"/>
  <polygon points="90,83 139,59 139,71 90,95" fill="#bbdefb"/>
  <polygon points="90,83 41,59 41,71 90,95" fill="#e3f2fd"/>
